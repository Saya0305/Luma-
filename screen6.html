<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Guide - EcoWater</title>
    <link rel="stylesheet" href="style2.css">
    <style>
        /*Specific styles only for this page that do not conflict with style2.css */
        .video-card {
            background: #fff;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: 10px;
        }

        .video-link-wrapper {
            position: relative;
            display: block;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #00b4d8;
            margin-bottom: 15px;
        }

        .play-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 180, 216, 0.9);
            color: white;
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .preview-img {
            width: 100%;
            display: block;
        }

        .header-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-box h1 {
            margin-bottom: 5px;
            font-size: 24px;
        }

        .header-box p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .nav-bar {
            z-index: 10000 !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h1 id="page-title">Video Instruction</h1>
            <p id="page-subtitle">Watch the tutorial</p>
            
            <div class="language-switch" style="justify-content: center;">
                <button class="lang-btn" id="l-ru" onclick="setLanguage('ru')">RU</button>
                <button class="lang-btn" id="l-kz" onclick="setLanguage('kz')">KZ</button>
                <button class="lang-btn" id="l-en" onclick="setLanguage('en')">EN</button>
            </div>
        </div>

        <div class="video-card">
            <a id="v-link" href="#" target="_blank" class="video-link-wrapper">
                <img id="v-img" src="" alt="Video Preview" class="preview-img">
                <div class="play-overlay">▶</div>
            </a>
            <p id="video-text" class="video-desc" style="color: #555; line-height: 1.4;"></p>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item">🏠<br><span>Инфо</span></a>
        <a href="screen2.html" class="nav-item">💧<br><span>Ввод</span></a>
        <a href="screen3.html" class="nav-item">📊<br><span>Анализ</span></a>
        <a href="screen6.html" class="nav-item active">🎬<br><span>Видео</span></a>
        <a href="screen4.html" class="nav-item">🌱<br><span>Осадок</span></a>
        <a href="screen5.html" class="nav-item">📈<br><span>История</span></a>
    </nav>

    <script>
        const content = {
            ru: {
                title: "Видео-инструкция",
                subtitle: "Как создать очищающую таблетку",
                desc: "Нажмите на превью, чтобы открыть видео-рецепт в YouTube.",
                link: "https://youtube.com/shorts/xgOG7XGV6yU",
                img: "https://i.ytimg.com/vi/xgOG7XGV6yU/maxresdefault.jpg"
            },
            kz: {
                title: "Видео-нұсқаулық",
                subtitle: "Тазарту таблеткасын қалай жасауға болады",
                desc: "YouTube-тегі рецептті көру үшін суретті басыңыз.",
                link: "https://youtube.com/shorts/-2lgvHkOwbI",
                img: "https://i.ytimg.com/vi/-2lgvHkOwbI/maxresdefault.jpg"
            },
            en: {
                title: "Video Instruction",
                subtitle: "How to create a purification tablet",
                desc: "Click the preview to watch the recipe on YouTube.",
                link: "https://youtube.com/shorts/WXGO58euats",
                img: "https://i.ytimg.com/vi/WXGO58euats/maxresdefault.jpg"
            }
        };

        function setLanguage(lang) {
            const data = content[lang] || content.ru;
            
            document.getElementById('page-title').innerText = data.title;
            document.getElementById('page-subtitle').innerText = data.subtitle;
            document.getElementById('video-text').innerText = data.desc;
            document.getElementById('v-link').href = data.link;
            document.getElementById('v-img').src = data.img;

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById('l-' + lang);
            if(activeBtn) activeBtn.classList.add('active');
            
            localStorage.setItem('userSelectedLang', lang);
            localStorage.setItem('appLang', lang);
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('userSelectedLang') || localStorage.getItem('appLang') || 'ru';
            setLanguage(savedLang);
        };
    </script>
</body>
</html>
